  <body>
    <div id="launcher"
     style="
       position:fixed;
       inset:0;
       background:#0b3d91;
       display:flex;
       flex-direction:column;
       justify-content:center;
       align-items:center;
       color:white;
       font-family:Arial,sans-serif;
       z-index:99999999;
     ">

    <h1>RepoClean</h1>

    <h2>v80.7</h2>

    <button id="startButton"
            style="
              font-size:30px;
              padding:20px 40px;
            ">
        Abrir AR
    </button>

</div>

  <div id="versionTag"
     style="
       position:fixed;
       top:10px;
       right:10px;       
       z-index:9999999;
       background:#003366;
       color:white;
       padding:8px 12px;
       font-family:Arial,sans-serif;
       font-size:20px;
       font-weight:bold;
       border-radius:6px;
     ">
  RepoClean v80.7
</div>
  
 
    <script>

document.getElementById("startButton").onclick = () => {

    document.getElementById("launcher").remove();

    const bundle = document.createElement("script");
    bundle.src = "bundle.js";
    document.body.appendChild(bundle);

    const bridge = document.createElement("script");
    bridge.src = "bridge.js?t=" + Date.now();
    document.body.appendChild(bridge);

};

</script>
