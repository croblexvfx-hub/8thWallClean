<!doctype html><html>
  <head><meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Image Tracking 8th Wall</title><meta itemprop="name" content="Empty Project">
    <meta name="twitter:title" content="Empty Project">
    <meta property="og:title" content="Empty Project">
    <meta property="og:site_name" content="Empty Project">
    <meta name="description" content="Start with a blank project.">
    <meta itemprop="description" content="Start with a blank project.">
    <meta property="og:description" content="Start with a blank project.">
    <meta name="twitter:description" content="Start with a blank project.">
    <script crossorigin="anonymous" src="./external/runtime/runtime.js">
      
    </script><script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam">

  </head>
  
  <body>
    <div id="launcher"
     style="
       position:fixed;
       inset:0;
       background:#0b3d91;
       display:flex;
       flex-direction:column;
       justify-content:center;
       align-items:center;
       color:white;
       font-family:Arial,sans-serif;
       z-index:99999999;
     ">

    <h1>RepoClean</h1>

    <h2></h2>

    <button id="startButton"
            style="
              font-size:30px;
              padding:20px 40px;
            ">
        Abrir AR
    </button>

</div>

  <div id="versionTag"></div>
  
 
    <script>

document.getElementById("startButton").onclick = () => {

    document.getElementById("launcher").remove();

    const bundle = document.createElement("script");
    bundle.src = "bundle.js";
    document.body.appendChild(bundle);

    const bridge = document.createElement("script");
    bridge.src = "bridge.js?t=" + Date.now();
    document.body.appendChild(bridge);

};

</script>

<script>
const VERSION = "v81.14";

document.querySelector("#launcher h2").textContent = VERSION;
document.getElementById("versionTag").textContent = "RepoClean " + VERSION;
</script>
    
</body>
</html>
