<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi AR Profesional Replicable</title>

  <!-- 1. Cargamos A-Frame -->
  <script src="https://aframe.io"></script>

  <!-- 2. El único motor de arranque real que tienes en tu carpeta -->
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
</head>

<body>
  <!-- 3. Activamos el motor indicando la ruta de tu imagen de la pizza -->
  <a-scene xrweb="imageTargets: Marcador_Profesional_Cliente; disableWorldTracking: true">
    
    <a-assets>
      <a-asset-item id="modelo-pizza" src="assets/Plato_05.glb"></a-asset-item>
    </a-assets>

    <!-- 4. Vinculamos el objeto 3D al marcador -->
    
      
    

    <a-camera camera3d></a-camera>
  </a-scene>
</body>
</html>
